name: Device-Tree-Generator

on:
  workflow_dispatch:
    inputs:
      DEVICE_IMG:
        description: '(.img) file link'
        required: true
        default: 'https://dumps.tadiphone.dev/dumps/samsung/a05s/-/raw/a05snsdxx-user-14-UP1A.231005.007-A057FXXS5CXH9-release-keys/recovery.img'
      DEVICE_BRANCH:
        description: 'your device branch name (Optional)'
        required: true
        default: 'android-12.1'
      GITHUB_TOKEN:
        description: 'your github Access token (Optional)'
        required: true
        default: 'XXXXXXXXXXXXXXXXXXXXXXXXXX'
      EMPTY_REPO:
        description: 'your empty repo name on github (Optional)'
        required: true
        default: 'android_device_samsung_a05s.git'
      COMMIT_MESSAGE:
        description: 'your commit message (Optional)'
        required: true
        default: 'TWRP device tree'
      PUSH_GITHUB:
        description: 'Push to GitHub Repository.'
        type: boolean
        required: true
        default: false
      RELEASE_FILE:
        description: 'Upload file to GitHub Release too.'
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Device Tree Generator by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # Add this step to ensure a clean Linux Python environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' 

    - name: Getting tools ready 
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio python3-magic
        # Downgrade to v2.1.0 which supports -m and -p flags
        pip3 install twrpdtgen==2.1.0
    
    - name: Downloading .img file
      run: |
        # Use curl -L to follow redirects (important for cloud storage links)
        curl -L "${{ github.event.inputs.DEVICE_IMG }}" -o boot.img
        
        # Verify if the file actually exists and isn't just an empty text file/error page
        if [ -f ./boot.img ] && [ $(stat -c%s "./boot.img") -gt 1000000 ]; then
            echo "BOOT_EXISTS=true" >> $GITHUB_ENV
            echo "boot.img downloaded successfully!"
        else
            echo "Download failed or file is too small to be a boot image!"
            exit 1
        fi
        
    - name: Generating Device tree
      run: |
        # Create a dummy build.prop so the tool doesn't crash
        echo "ro.product.system.brand=samsung" > build.prop
        echo "ro.product.system.manufacturer=samsung" >> build.prop
        echo "ro.product.system.model=Galaxy A23" >> build.prop
        echo "ro.product.system.device=a23" >> build.prop
        echo "ro.product.system.name=a23" >> build.prop
        echo "ro.build.version.release=12" >> build.prop
        echo "ro.build.version.sdk=31" >> build.prop
        
        # Run the tool. It should now find the build.prop in the current folder.
        python3 -m twrpdtgen boot.img
        elif [ -f ./recovery.img ]; then
            python3 -m twrpdtgen recovery.img --m samsung --p a23
        else
            echo "No image found to process!"
            exit 1
        fi
        
    - name: Set Build Date 
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: getting device information 
      run: |
          mv ./output/ device
          # This will now correctly navigate to device/samsung/a23
          cd device/*/
          echo "DEVICE_ID=${PWD##*/}" >> $GITHUB_ENV
          cd *
          echo "DEVICE_IDD=${PWD##*/}" >> $GITHUB_ENV

    - name: Add to Zip
      run: |
          zip -r ${{ env.DEVICE_ID }}_${{ env.DEVICE_IDD }}_tree.zip ./device/
          
    - name: Release
      if: github.event.inputs.RELEASE_FILE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.DEVICE_ID }}_${{ env.DEVICE_IDD }}_tree.zip
        name: ${{ env.DEVICE_ID }} ${{ env.DEVICE_IDD }} device tree // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |

    - name: Push to GitHub
      if: github.event.inputs.PUSH_GITHUB == 'true'
      run: |
          git config --global user.email "kinguser981@gmail.com"
          git config --global user.name "Samuel Kendall"
          cd ./device/*/*/
          git init
          git add *
          git commit -m "${{ github.event.inputs.COMMIT_MESSAGE }}"
          git branch -M ${{ github.event.inputs.DEVICE_BRANCH }}
          git remote add origin git@github.com:${{ github.actor }}/${{ github.event.inputs.EMPTY_REPO }}
          git remote set-url origin https://${{ github.actor }}:${{ github.event.inputs.GITHUB_TOKEN }}@github.com/${{ github.actor }}/${{ github.event.inputs.EMPTY_REPO }}
          git push -u origin ${{ github.event.inputs.DEVICE_BRANCH }}
